baseURL = "https://littlenopro.github.io/focus-on-career/"
languageCode = "vi-vn"
title = "Focus on Career - L1ttleNoPro"
theme = "hugo-texify3"

# 1. Định nghĩa Author dưới dạng Table (Sửa lỗi Table vs Value)
[author]
  name = "Đặng Minh Tú"

# 2. Các cấu hình hệ thống
enableGitInfo = true
enableRobotsTXT = true
hasCJKLanguage = true

[pagination]
  pagerSize = 5

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[params]
  title = "Focus on Career"
  description = "Lộ trình trở thành Solution Architect & Security Expert"
  
  # Cấu hình bài viết
  math = true
  toc = true
  numberedSubtitles = true
  dateFormat = "02/01/2006"
  rootFontSize = "105%"
  
  footnote = "© 2026 Đặng Minh Tú - Bảo mật thông tin UIT"

  # KHÔNG viết author = "..." ở đây nữa để tránh lỗi unmarshal
  [params.author]
    name = "Đặng Minh Tú"
    bio = "Sinh viên An toàn thông tin tại UIT (ATTN2024)"

  [params.sharingbuttons]
    facebook = false
    twitter = false
    email = false
    linkedin = false
    reddit = false
    whatsapp = false
    hackernews = false
    telegram = false

  [params.commentEngine]
    code = ""

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "gruvbox"
